<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback | Garrison Academy Kharian Cantt</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,400;1,600&family=Josefin+Sans:wght@300;400;600;700&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --gold: #C9A84C;
            --gold-light: #E8C97A;
            --navy: #0D1F3C;
            --forest: #1A4A2E;
            --cream: #FAF7F2;
            --warm-white: #FFFDF9;
            --text-mid: #4A4A4A;
            --border: rgba(201, 168, 76, 0.25);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Josefin Sans', sans-serif; background: var(--cream); color: var(--text-mid); overflow-x: hidden; }

        /* HERO */
        .hero { position: relative; min-height: 70vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; background: var(--navy); }
        .hero-bg { position: absolute; inset: 0; background: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRUPtDYzoi2LpsaB0MOYzoqWr3SQLZUM8NezA&s') center/cover no-repeat; opacity: 0.12; animation: slowZoom 20s ease-in-out infinite alternate; }
        @keyframes slowZoom { from { transform: scale(1.05); } to { transform: scale(1.12); } }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(160deg, rgba(13,31,60,0.97) 0%, rgba(26,74,46,0.85) 100%); }
        .hero::before, .hero::after { content: ''; position: absolute; width: 200px; height: 200px; border: 1px solid rgba(201,168,76,0.3); }
        .hero::before { top: 40px; left: 40px; border-right: none; border-bottom: none; }
        .hero::after { bottom: 40px; right: 40px; border-left: none; border-top: none; }
        .hero-inner { position: relative; z-index: 2; max-width: 850px; padding: 40px 30px; animation: fadeUp 1.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        .hero-badge { display: inline-flex; align-items: center; gap: 12px; background: rgba(201,168,76,0.12); border: 1px solid var(--border); padding: 8px 24px; margin-bottom: 30px; letter-spacing: 5px; font-size: 11px; color: var(--gold-light); text-transform: uppercase; font-weight: 600; }
        .hero-badge::before, .hero-badge::after { content: '◆'; font-size: 8px; color: var(--gold); }
        .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(48px, 8vw, 90px); font-weight: 300; color: #FFF; line-height: 1.05; margin-bottom: 10px; }
        .hero h1 em { font-style: italic; color: var(--gold-light); }
        .hero-divider { width: 70px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 30px auto; }
        .hero p { font-size: 14px; color: rgba(255,255,255,0.65); letter-spacing: 3px; text-transform: uppercase; font-weight: 300; }

        /* SHARED */
        .label-tag { font-size: 10px; letter-spacing: 6px; text-transform: uppercase; color: var(--gold); font-weight: 700; margin-bottom: 16px; display: block; }
        .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px, 5vw, 56px); font-weight: 400; color: var(--navy); line-height: 1.1; }
        .section-title em { font-style: italic; color: var(--forest); }
        .title-rule { width: 50px; height: 2px; background: var(--gold); margin: 24px auto 0; }
        .section-header { text-align: center; margin-bottom: 70px; }

        /* FEEDBACK SECTION */
        .feedback-section { background: var(--warm-white); padding: 100px 5%; }

        /* FORM CONTAINER */
        .form-container { max-width: 700px; margin: 0 auto; }

        /* FORM GROUP */
        .form-group { margin-bottom: 30px; }
        .form-group label { display: block; font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--navy); font-weight: 600; margin-bottom: 10px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 16px; font-family: 'Josefin Sans', sans-serif; font-size: 13px; color: var(--text-mid); background: var(--cream); border: 1px solid var(--border); border-left: 3px solid var(--gold); transition: all 0.3s ease; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; background: #FAFAF8; border-left-color: var(--forest); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .form-group textarea { resize: vertical; min-height: 120px; }

        /* RADIO GROUP */
        .radio-group { display: flex; gap: 30px; }
        .radio-option { display: flex; align-items: center; gap: 8px; }
        .radio-option input[type="radio"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--gold); }
        .radio-option label { margin: 0; font-size: 12px; letter-spacing: 0; text-transform: none; font-weight: 400; cursor: pointer; }

        /* SUBMIT BUTTON */
        .submit-btn { width: 100%; background: transparent; color: var(--gold-light); border: 1px solid var(--gold); padding: 16px; font-family: 'Josefin Sans', sans-serif; font-size: 12px; letter-spacing: 5px; text-transform: uppercase; font-weight: 600; transition: all 0.4s ease; position: relative; overflow: hidden; cursor: pointer; }
        .submit-btn::before { content: ''; position: absolute; inset: 0; background: var(--gold); transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: -1; }
        .submit-btn:hover { color: var(--navy); }
        .submit-btn:hover::before { transform: translateX(0); }

        /* RESPONSIVE */
        @media (max-width: 768px) { .hero h1 { font-size: 42px; } .form-group input, .form-group textarea { padding: 12px 14px; } .hero::before, .hero::after { display: none; } }

    </style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="hero-inner">
        <div class="hero-badge">Est. 1984 · Kharian Cantt · APSACS</div>
        <h1>Your <em>Feedback</em></h1>
        <div class="hero-divider"></div>
        <p>We Value Your Opinion</p>
    </div>
</section>

<!-- FEEDBACK SECTION -->
<section class="feedback-section">
    <div class="section-header">
        <span class="label-tag">Share Your Thoughts</span>
        <h2 class="section-title">Feedback <em>Form</em></h2>
        <div class="title-rule"></div>
    </div>

    <div class="form-container">
        <form method="POST" action="">
            <!-- NAME -->
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <!-- EMAIL -->
            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            </div>

            <!-- CATEGORY -->
            <div class="form-group">
                <label for="category">Feedback Category *</label>
                <select id="category" name="category" required>
                    <option value="">Select Category</option>
                    <option value="academics">Academics</option>
                    <option value="facilities">Facilities</option>
                    <option value="staff">Staff & Faculty</option>
                    <option value="administration">Administration</option>
                    <option value="student-life">Student Life</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <!-- RATING -->
            <div class="form-group">
                <label>Overall Experience Rating *</label>
                <div class="radio-group">
                    <div class="radio-option">
                        <input type="radio" id="excellent" name="rating" value="excellent" required>
                        <label for="excellent">Excellent</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="good" name="rating" value="good" required>
                        <label for="good">Good</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="average" name="rating" value="average" required>
                        <label for="average">Average</label>
                    </div>
                    <div class="radio-option">
                        <input type="radio" id="poor" name="rating" value="poor" required>
                        <label for="poor">Poor</label>
                    </div>
                </div>
            </div>

            <!-- MESSAGE -->
            <div class="form-group">
                <label for="message">Your Feedback *</label>
                <textarea id="message" name="message" placeholder="Share your valuable feedback..." required></textarea>
            </div>

            <!-- SUBMIT -->
            <button type="submit" class="submit-btn">Submit Feedback</button>
        </form>
    </div>
</section>

</body>

</html>
